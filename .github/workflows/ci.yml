name: AXON CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AXON_LLM_MODE: mock
  AXON_LLM_PROVIDER: mock
  PYTHONUNBUFFERED: "1"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Phase 8 verification
        run: bash scripts/verify_phase8.sh

      - name: Phase 9 verification
        run: bash scripts/verify_phase9.sh

      - name: Validate Docker Compose config
        run: |
          docker compose --profile core config
          docker compose --profile core config --services
          docker compose --profile learning config
          docker compose --profile obs config
          docker compose --profile ros2 config
          docker compose --profile ros2-nav-slam config
